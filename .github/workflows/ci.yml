name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  test:
    name: Swift tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: swift test

  build:
    name: Xcode build
    runs-on: macos-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with xcodebuild
        run: xcodebuild -project PageLumen.xcodeproj -scheme PageLumen -configuration Debug -destination 'generic/platform=macOS' build
