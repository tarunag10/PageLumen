name: PageLumen
options:
  bundleIdPrefix: com.pagelumen
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
packages: {}
targets:
  PageLumenCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/PageLumenCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pagelumen.PageLumenCore
        DEFINES_MODULE: true
    info:
      path: generated/PageLumenCore-Info.plist
      properties:
        CFBundleName: PageLumenCore
        CFBundlePackageType: FMWK
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
  PageLumen:
    type: application
    platform: macOS
    sources:
      - path: Sources/PageLumen
    dependencies:
      - target: PageLumenCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pagelumen.PageLumen
        PRODUCT_NAME: PageLumen
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
    info:
      path: generated/PageLumen-Info.plist
      properties:
        CFBundleName: PageLumen
        CFBundleDisplayName: PageLumen
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: ""
  PageLumenCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PageLumenCoreTests
    dependencies:
      - target: PageLumenCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pagelumen.PageLumenCoreTests
    info:
      path: generated/PageLumenCoreTests-Info.plist
      properties:
        CFBundleName: PageLumenCoreTests
        CFBundlePackageType: BNDL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
schemes:
  PageLumen:
    build:
      targets:
        PageLumen: all
        PageLumenCoreTests: [test]
    run:
      config: Debug
      executable: PageLumen
    test:
      config: Debug
      targets:
        - PageLumenCoreTests
